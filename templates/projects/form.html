{% extends 'base.html' %}
{% block title %}{{ title }} — Мои Дела{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 style="font-family:'Orbitron',sans-serif;font-weight:700;margin:0">{{ title }}</h4>
    <a href="{% url 'projects:list' %}" class="btn btn-outline-primary btn-sm">← Назад</a>
  </div>
  <div class="card-g p-4">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div style="color:var(--danger);font-size:.78rem;margin-top:.25rem">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary px-4">Сохранить</button>
    </form>
  </div>
</div>
{% endblock %}
